name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, dependency-free guardrails — the reliable signal. Encodes the CLAUDE.md
  # rules (no empty catch blocks; version strings in sync) as a hard gate.
  conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run convention checks
        run: bash tools/checks/check-conventions.sh

  # Compile the mod + run the pure-logic tests with no game installed, using the
  # community reference assemblies (see the csproj fallback). net472 builds on the
  # SDK's targeting pack; Mono runs the net472 test assembly.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Mono (net472 test runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-devel
      - name: Restore
        run: dotnet restore tests/AshAndEmber.Tests.csproj
      - name: Build
        run: dotnet build tests/AshAndEmber.Tests.csproj -c Debug --no-restore
      - name: Test
        # Exclude tests categorised RequiresGame: they touch classes with engine-typed
        # fields that can't load against the compile-only reference assemblies. They run
        # locally against a real Bannerlord install.
        run: dotnet test tests/AshAndEmber.Tests.csproj -c Debug --no-build --logger "console;verbosity=normal" --filter "TestCategory!=RequiresGame"
